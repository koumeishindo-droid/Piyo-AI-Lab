<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piyo AI Lab - 管理画面</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+JP:wght@400;500;700;900&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #FFD43B;
            --primary-dark: #F0B400;
            --accent: #00B4A0;
            --accent2: #FF6B9D;
            --bg: #F7F8FC;
            --sidebar-bg: #0F1923;
            --text-dark: #1A1D23;
            --text-mid: #5A6170;
            --text-light: #A0A8B8;
            --card-shadow: 0 2px 16px rgba(0,0,0,0.06);
            --radius: 14px;
            --danger: #EF4444;
            --success: #10B981;
        }

        body {
            font-family: 'Noto Sans JP', 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text-dark);
            line-height: 1.8;
            -webkit-font-smoothing: antialiased;
        }

        /* ===== LAYOUT ===== */
        .layout { display: flex; min-height: 100vh; }

        .sidebar {
            width: 260px;
            background: var(--sidebar-bg);
            color: white;
            padding: 24px;
            flex-shrink: 0;
            position: fixed;
            top: 0; left: 0; bottom: 0;
            overflow-y: auto;
        }

        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .sidebar-logo img {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            object-fit: cover;
        }

        .sidebar-logo span {
            font-family: 'Inter', sans-serif;
            font-weight: 900;
            font-size: 1.15rem;
        }

        .sidebar-logo span em {
            color: var(--accent);
            font-style: normal;
        }

        .sidebar-badge {
            background: rgba(255,255,255,0.08);
            border-radius: 6px;
            padding: 4px 12px;
            font-size: 0.7rem;
            color: var(--accent);
            font-weight: 600;
            display: inline-block;
            margin-bottom: 32px;
        }

        .sidebar-nav { list-style: none; }
        .sidebar-nav li { margin-bottom: 2px; }

        .sidebar-nav a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            border-radius: 10px;
            color: rgba(255,255,255,0.5);
            text-decoration: none;
            font-size: 0.88rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .sidebar-nav a:hover {
            background: rgba(255,255,255,0.06);
            color: rgba(255,255,255,0.85);
        }

        .sidebar-nav a.active {
            background: rgba(255,255,255,0.1);
            color: white;
        }

        .sidebar-divider {
            border: none;
            border-top: 1px solid rgba(255,255,255,0.06);
            margin: 20px 0;
        }

        .sidebar-footer { margin-top: 32px; }

        .sidebar-footer a {
            display: flex;
            align-items: center;
            gap: 8px;
            color: rgba(255,255,255,0.4);
            text-decoration: none;
            font-size: 0.84rem;
            padding: 8px 0;
            transition: color 0.2s;
        }

        .sidebar-footer a:hover { color: white; }

        /* ===== MAIN ===== */
        .main {
            flex: 1;
            margin-left: 260px;
            padding: 32px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
        }

        .page-header h1 {
            font-family: 'Inter', sans-serif;
            font-size: 1.5rem;
            font-weight: 900;
            letter-spacing: -0.5px;
        }

        .btn {
            padding: 10px 22px;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 0.88rem;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: inherit;
        }

        .btn-primary { background: var(--text-dark); color: white; }
        .btn-primary:hover { opacity: 0.85; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-danger:hover { opacity: 0.85; }
        .btn-outline { background: transparent; border: 1px solid rgba(0,0,0,0.12); color: var(--text-mid); }
        .btn-outline:hover { border-color: var(--text-dark); color: var(--text-dark); }
        .btn-sm { padding: 6px 14px; font-size: 0.8rem; }

        /* ===== STATS ===== */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 28px;
        }

        .stat-card {
            background: white;
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: var(--card-shadow);
            border: 1px solid rgba(0,0,0,0.04);
        }

        .stat-card-label { font-size: 0.78rem; color: var(--text-mid); margin-bottom: 4px; }

        .stat-card-value {
            font-family: 'Inter', sans-serif;
            font-size: 1.8rem;
            font-weight: 900;
        }

        .stat-card-value.yellow { color: var(--primary-dark); }
        .stat-card-value.teal { color: var(--accent); }
        .stat-card-value.pink { color: var(--accent2); }

        /* ===== TABLE ===== */
        .table-container {
            background: white;
            border-radius: var(--radius);
            box-shadow: var(--card-shadow);
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.04);
        }

        .table-header {
            padding: 18px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0,0,0,0.04);
        }

        .table-header h3 { font-size: 0.95rem; font-weight: 700; }

        .table-empty {
            text-align: center;
            padding: 48px;
            color: var(--text-light);
        }

        .table-empty img {
            width: 70px;
            opacity: 0.2;
            margin-bottom: 12px;
        }

        table { width: 100%; border-collapse: collapse; }

        th {
            text-align: left;
            padding: 10px 24px;
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid rgba(0,0,0,0.04);
        }

        td {
            padding: 14px 24px;
            font-size: 0.88rem;
            border-bottom: 1px solid rgba(0,0,0,0.04);
            vertical-align: middle;
        }

        tr:hover { background: #FAFBFD; }

        .level-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 700;
        }

        .level-badge.beginner { background: #ECFDF5; color: #059669; }
        .level-badge.intermediate { background: #FFFBEB; color: #D97706; }
        .level-badge.advanced { background: #FEF2F2; color: #DC2626; }

        .actions-cell { display: flex; gap: 6px; }

        /* ===== EDITOR ===== */
        .editor-panel {
            display: none;
            background: white;
            border-radius: var(--radius);
            box-shadow: var(--card-shadow);
            padding: 32px;
            margin-bottom: 24px;
            border: 1px solid rgba(0,0,0,0.04);
        }

        .editor-panel.active { display: block; }

        .editor-panel h3 {
            font-size: 1.05rem;
            font-weight: 800;
            margin-bottom: 20px;
        }

        .form-group { margin-bottom: 18px; }

        .form-group label {
            display: block;
            font-size: 0.82rem;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text-mid);
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid rgba(0,0,0,0.1);
            border-radius: 10px;
            font-size: 0.9rem;
            font-family: inherit;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0,180,160,0.1);
        }

        .form-group textarea { min-height: 200px; resize: vertical; }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 16px;
        }

        .form-actions { display: flex; gap: 12px; margin-top: 20px; }

        .editor-hint {
            background: var(--bg);
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 0.78rem;
            color: var(--text-mid);
            margin-bottom: 18px;
        }

        /* Thumb upload area */
        .thumb-upload-area {
            margin-bottom: 18px;
        }

        .thumb-upload-area label {
            display: block;
            font-size: 0.82rem;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text-mid);
        }

        .thumb-dropzone {
            border: 2px dashed rgba(0,0,0,0.12);
            border-radius: 12px;
            padding: 24px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
            position: relative;
            overflow: hidden;
        }

        .thumb-dropzone:hover {
            border-color: var(--accent);
            background: rgba(0,180,160,0.02);
        }

        .thumb-dropzone.has-image {
            padding: 0;
            border-style: solid;
            border-color: rgba(0,0,0,0.06);
        }

        .thumb-dropzone img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 10px;
            display: block;
        }

        .thumb-dropzone .placeholder {
            color: var(--text-light);
            font-size: 0.84rem;
        }

        .thumb-dropzone .placeholder svg {
            display: block;
            margin: 0 auto 8px;
        }

        .thumb-dropzone input[type="file"] {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .thumb-remove-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(0,0,0,0.6);
            color: white;
            border: none;
            border-radius: 8px;
            width: 28px;
            height: 28px;
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
        }

        /* ===== Q&A ADMIN ===== */
        .qa-page { display: none; }
        .qa-page.active { display: block; }

        .qa-admin-card {
            background: white;
            border-radius: var(--radius);
            box-shadow: var(--card-shadow);
            margin-bottom: 12px;
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.04);
        }

        .qa-admin-header {
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
        }

        .qa-admin-q { flex: 1; }

        .qa-admin-q h4 {
            font-size: 0.92rem;
            font-weight: 700;
            margin-bottom: 2px;
        }

        .qa-admin-q .qa-meta {
            font-size: 0.76rem;
            color: var(--text-light);
            display: flex;
            gap: 12px;
        }

        .qa-status-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 700;
        }

        .qa-status-badge.pending { background: #FFFBEB; color: #D97706; }
        .qa-status-badge.published { background: #ECFDF5; color: #059669; }

        .qa-admin-body {
            padding: 0 24px 20px;
            border-top: 1px solid rgba(0,0,0,0.04);
        }

        .qa-admin-body .form-group { margin-top: 16px; }

        .qa-admin-body textarea {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid rgba(0,0,0,0.1);
            border-radius: 10px;
            font-size: 0.9rem;
            font-family: inherit;
            min-height: 100px;
            resize: vertical;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .qa-admin-body textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0,180,160,0.1);
        }

        .qa-admin-actions {
            display: flex;
            gap: 6px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .qa-admin-hint {
            font-size: 0.76rem;
            color: var(--text-light);
            margin-top: 6px;
        }

        .qa-stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .qa-tab-btns {
            display: flex;
            gap: 6px;
            margin-bottom: 20px;
        }

        .qa-tab-btn {
            padding: 8px 18px;
            border: 1px solid rgba(0,0,0,0.08);
            border-radius: 8px;
            background: white;
            font-size: 0.84rem;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
            color: var(--text-mid);
        }

        .qa-tab-btn.active {
            background: var(--text-dark);
            border-color: var(--text-dark);
            color: white;
        }

        /* ===== AUTHORS PAGE ===== */
        .author-name-cell {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .author-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.78rem;
            color: white;
            flex-shrink: 0;
        }

        .author-bar {
            height: 6px;
            border-radius: 3px;
            background: #F0F1F5;
            overflow: hidden;
            min-width: 60px;
        }

        .author-bar-fill {
            height: 100%;
            border-radius: 3px;
        }

        /* ===== TOAST ===== */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--text-dark);
            color: white;
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.88rem;
            box-shadow: 0 8px 30px rgba(0,0,0,0.2);
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s;
            z-index: 999;
        }

        .toast.show { transform: translateY(0); opacity: 1; }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main { margin-left: 0; }
            .form-row { grid-template-columns: 1fr; }
            .stats-row { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

    <div class="layout">
        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="sidebar-logo">
                <img src="images/piyo-character.png" alt="Piyo">
                <span>Piyo <em>AI</em> Lab</span>
            </div>
            <div class="sidebar-badge">管理画面</div>
            <nav>
                <ul class="sidebar-nav">
                    <li><a href="#" class="active" data-page="dashboard">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg>
                        ダッシュボード
                    </a></li>
                    <li><a href="#" data-page="articles">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                        記事管理
                    </a></li>
                    <li><a href="#" data-page="new">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                        新規投稿
                    </a></li>
                    <li><a href="#" data-page="qa">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                        Q&A管理
                    </a></li>
                    <li><a href="#" data-page="authors">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                        執筆者統計
                    </a></li>
                </ul>
            </nav>
            <hr class="sidebar-divider">
            <div class="sidebar-footer">
                <a href="index.html">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                    サイトを表示
                </a>
            </div>
        </aside>

        <!-- MAIN -->
        <main class="main">
            <div id="page-dashboard">
                <div class="page-header">
                    <h1>ダッシュボード</h1>
                    <div style="display:flex; gap:8px;">
                        <button class="btn" id="btn-rebuild" title="記事の最新版を本番サイトに反映します（1〜2分）">🔄 サイトを再ビルド</button>
                        <button class="btn btn-primary" id="btn-new-article">＋ 新規投稿</button>
                    </div>
                </div>
                <div id="rebuild-status" style="display:none; margin-bottom:16px; padding:12px 16px; border-radius:8px; font-size:0.9rem;"></div>

                <div class="stats-row" id="admin-stats"></div>

                <!-- MASCOT -->
                <div style="margin-bottom:24px; text-align:center;">
                    <img src="images/piyo-character.png" alt="ピヨ" style="max-width:200px; width:100%;">
                </div>

                <!-- EDITOR -->
                <div class="editor-panel" id="editor-panel">
                    <h3 id="editor-title">新しい記事を投稿</h3>
                    <div class="editor-hint">
                        HTMLタグが使えます。見出しは <code>&lt;h3&gt;</code>、コードブロックは <code>&lt;pre&gt;</code>、インラインコードは <code>&lt;code&gt;</code> を使用してください。
                    </div>
                    <input type="hidden" id="edit-id">

                    <!-- サムネイル画像 -->
                    <div class="thumb-upload-area">
                        <label>サムネイル画像</label>
                        <div class="thumb-dropzone" id="thumb-dropzone">
                            <div class="placeholder" id="thumb-placeholder">
                                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
                                クリックまたはドラッグ&ドロップで画像をアップロード
                            </div>
                            <img id="thumb-preview" style="display:none;" alt="プレビュー">
                            <button type="button" class="thumb-remove-btn" id="thumb-remove" style="display:none;">&times;</button>
                            <input type="file" id="thumb-file" accept="image/*">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>タイトル</label>
                        <input type="text" id="edit-title" placeholder="記事タイトルを入力...">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>カテゴリ</label>
                            <select id="edit-category">
                                <option value="AI入門">AI入門</option>
                                <option value="機械学習">機械学習</option>
                                <option value="プロンプト">プロンプト</option>
                                <option value="画像生成AI">画像生成AI</option>
                                <option value="トレンド">トレンド</option>
                                <option value="ワークフロー">ワークフロー</option>
                                <option value="ツール">ツール</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>レベル</label>
                            <select id="edit-level">
                                <option value="beginner">ひよこ（初心者）</option>
                                <option value="intermediate">育ちざかり（中級）</option>
                                <option value="advanced">にわとり（上級）</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>サムネイル色（画像未設定時）</label>
                            <select id="edit-thumb">
                                <option value="linear-gradient(135deg, #a8e6cf, #dcedc1)">グリーン</option>
                                <option value="linear-gradient(135deg, #ffd3b6, #ffaaa5)">オレンジ</option>
                                <option value="linear-gradient(135deg, #c3bef0, #a8d8ea)">パープル</option>
                                <option value="linear-gradient(135deg, #f5cd79, #f19066)">イエロー</option>
                                <option value="linear-gradient(135deg, #6c5ce7, #a29bfe)">ディープパープル</option>
                                <option value="linear-gradient(135deg, #ff9a9e, #fecfef)">ピンク</option>
                                <option value="linear-gradient(135deg, #a8d8ea, #4ECDC4)">シアン</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>執筆者名（管理用・サイトには表示されません）</label>
                        <input type="text" id="edit-author" placeholder="例: 山田太郎">
                    </div>
                    <div class="form-group">
                        <label>概要</label>
                        <input type="text" id="edit-excerpt" placeholder="記事の概要を入力...">
                    </div>
                    <div class="form-group">
                        <label>本文（HTML）</label>
                        <textarea id="edit-content" placeholder="<h3>見出し</h3>&#10;<p>本文を入力...</p>"></textarea>
                    </div>
                    <div class="form-actions">
                        <button class="btn btn-primary" id="btn-save">記事を保存</button>
                        <button class="btn btn-outline" id="btn-cancel">キャンセル</button>
                    </div>
                </div>

                <!-- TABLE -->
                <div class="table-container">
                    <div class="table-header">
                        <h3>記事一覧</h3>
                    </div>
                    <div id="table-body"></div>
                </div>
            </div>
            <!-- Q&A PAGE -->
            <div id="page-qa" class="qa-page">
                <div class="page-header">
                    <h1>Q&A管理</h1>
                </div>

                <div class="qa-stats-row" id="qa-stats"></div>

                <div class="qa-tab-btns">
                    <button class="qa-tab-btn active" data-filter="all">すべて</button>
                    <button class="qa-tab-btn" data-filter="pending">未回答</button>
                    <button class="qa-tab-btn" data-filter="published">公開済み</button>
                </div>

                <div id="qa-admin-list"></div>
            </div>
            <!-- AUTHORS PAGE -->
            <div id="page-authors" class="qa-page">
                <div class="page-header">
                    <h1>執筆者統計</h1>
                </div>
                <div id="authors-stats-cards" class="stats-row"></div>
                <div class="table-container">
                    <div class="table-header">
                        <h3>執筆者別パフォーマンス</h3>
                    </div>
                    <div id="authors-table-body"></div>
                </div>
            </div>
        </main>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // ===== DATA =====
        const STORAGE_KEY = 'piyo_ai_lab_data';

        function loadData() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) return JSON.parse(saved);
            return { articles: [] };
        }

        function saveData(d) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(d));
        }

        let data = loadData();
        const levelLabels = { beginner: 'ひよこ', intermediate: '育ちざかり', advanced: 'にわとり' };

        // Current thumbnail image data
        let currentThumbImage = '';

        // ===== HELPERS =====
        function avgRating(ratings) {
            if (!ratings || !ratings.length) return '-';
            return (ratings.reduce((a, b) => a + b, 0) / ratings.length).toFixed(1);
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2500);
        }

        function nextId() {
            return data.articles.length ? Math.max(...data.articles.map(a => a.id)) + 1 : 1;
        }

        // ===== THUMBNAIL IMAGE =====
        const thumbDropzone = document.getElementById('thumb-dropzone');
        const thumbFile = document.getElementById('thumb-file');
        const thumbPreview = document.getElementById('thumb-preview');
        const thumbPlaceholder = document.getElementById('thumb-placeholder');
        const thumbRemove = document.getElementById('thumb-remove');

        function handleThumbFile(file) {
            if (!file || !file.type.startsWith('image/')) return;
            // Limit: ~500KB base64
            if (file.size > 400000) {
                showToast('画像サイズが大きすぎます（400KB以下推奨）');
            }
            const reader = new FileReader();
            reader.onload = (e) => {
                // Resize image for storage
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const maxW = 800;
                    const maxH = 450;
                    let w = img.width;
                    let h = img.height;
                    if (w > maxW) { h = h * maxW / w; w = maxW; }
                    if (h > maxH) { w = w * maxH / h; h = maxH; }
                    canvas.width = w;
                    canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    currentThumbImage = canvas.toDataURL('image/jpeg', 0.8);
                    showThumbPreview(currentThumbImage);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function showThumbPreview(src) {
            thumbPreview.src = src;
            thumbPreview.style.display = 'block';
            thumbPlaceholder.style.display = 'none';
            thumbRemove.style.display = 'flex';
            thumbDropzone.classList.add('has-image');
        }

        function clearThumbPreview() {
            currentThumbImage = '';
            thumbPreview.style.display = 'none';
            thumbPreview.src = '';
            thumbPlaceholder.style.display = 'block';
            thumbRemove.style.display = 'none';
            thumbDropzone.classList.remove('has-image');
            thumbFile.value = '';
        }

        thumbFile.addEventListener('change', (e) => {
            if (e.target.files[0]) handleThumbFile(e.target.files[0]);
        });

        thumbRemove.addEventListener('click', (e) => {
            e.stopPropagation();
            clearThumbPreview();
        });

        // Drag & drop
        thumbDropzone.addEventListener('dragover', (e) => {
            e.preventDefault();
            thumbDropzone.style.borderColor = 'var(--accent)';
        });
        thumbDropzone.addEventListener('dragleave', () => {
            thumbDropzone.style.borderColor = '';
        });
        thumbDropzone.addEventListener('drop', (e) => {
            e.preventDefault();
            thumbDropzone.style.borderColor = '';
            if (e.dataTransfer.files[0]) handleThumbFile(e.dataTransfer.files[0]);
        });

        // ===== RENDER STATS =====
        function renderStats() {
            const total = data.articles.length;
            const totalViews = data.articles.reduce((s, a) => s + (a.views || 0), 0);
            const allRatings = data.articles.flatMap(a => a.ratings || []);
            const avgAll = allRatings.length ? (allRatings.reduce((a, b) => a + b, 0) / allRatings.length).toFixed(1) : '-';

            document.getElementById('admin-stats').innerHTML = `
                <div class="stat-card">
                    <div class="stat-card-label">記事数</div>
                    <div class="stat-card-value yellow">${total}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-card-label">総閲覧数</div>
                    <div class="stat-card-value teal">${totalViews.toLocaleString()}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-card-label">平均評価</div>
                    <div class="stat-card-value pink">★ ${avgAll}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-card-label">総評価数</div>
                    <div class="stat-card-value">${allRatings.length}</div>
                </div>
            `;
        }

        // ===== RENDER TABLE =====
        function renderTable() {
            const container = document.getElementById('table-body');

            if (!data.articles.length) {
                container.innerHTML = `
                    <div class="table-empty">
                        <img src="images/piyo-character.png" alt="Piyo">
                        <p>まだ記事がありません。「＋ 新規投稿」から記事を作成しましょう！</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = `
                <table>
                    <thead>
                        <tr>
                            <th>タイトル</th>
                            <th>執筆者</th>
                            <th>カテゴリ</th>
                            <th>レベル</th>
                            <th>閲覧数</th>
                            <th>評価</th>
                            <th>日付</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${data.articles.map(a => `
                            <tr>
                                <td><strong>${a.title}</strong></td>
                                <td>${a.author || '<span style="color:var(--text-light)">―</span>'}</td>
                                <td>${a.category}</td>
                                <td><span class="level-badge ${a.level}">${a.levelLabel}</span></td>
                                <td>${(a.views || 0).toLocaleString()}</td>
                                <td>★ ${avgRating(a.ratings)} (${(a.ratings || []).length})</td>
                                <td>${a.date}</td>
                                <td>
                                    <div class="actions-cell">
                                        <button class="btn btn-outline btn-sm" onclick="editArticle(${a.id})">編集</button>
                                        <button class="btn btn-danger btn-sm" onclick="deleteArticle(${a.id})">削除</button>
                                    </div>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        // ===== EDITOR =====
        function openEditor(article = null) {
            const panel = document.getElementById('editor-panel');
            panel.classList.add('active');

            if (article) {
                document.getElementById('editor-title').textContent = '記事を編集';
                document.getElementById('edit-id').value = article.id;
                document.getElementById('edit-title').value = article.title;
                document.getElementById('edit-author').value = article.author || '';
                document.getElementById('edit-category').value = article.category;
                document.getElementById('edit-level').value = article.level;
                document.getElementById('edit-excerpt').value = article.excerpt;
                document.getElementById('edit-content').value = article.content;
                document.getElementById('edit-thumb').value = article.thumb || '';
                if (article.thumbImage) {
                    currentThumbImage = article.thumbImage;
                    showThumbPreview(article.thumbImage);
                } else {
                    clearThumbPreview();
                }
            } else {
                document.getElementById('editor-title').textContent = '新しい記事を投稿';
                document.getElementById('edit-id').value = '';
                document.getElementById('edit-title').value = '';
                document.getElementById('edit-author').value = '';
                document.getElementById('edit-category').value = 'AI入門';
                document.getElementById('edit-level').value = 'beginner';
                document.getElementById('edit-excerpt').value = '';
                document.getElementById('edit-content').value = '';
                document.getElementById('edit-thumb').value = 'linear-gradient(135deg, #a8e6cf, #dcedc1)';
                clearThumbPreview();
            }

            panel.scrollIntoView({ behavior: 'smooth' });
        }

        function closeEditor() {
            document.getElementById('editor-panel').classList.remove('active');
            clearThumbPreview();
        }

        function saveArticle() {
            const id = document.getElementById('edit-id').value;
            const title = document.getElementById('edit-title').value.trim();
            const author = document.getElementById('edit-author').value.trim();
            const category = document.getElementById('edit-category').value;
            const level = document.getElementById('edit-level').value;
            const excerpt = document.getElementById('edit-excerpt').value.trim();
            const content = document.getElementById('edit-content').value.trim();
            const thumb = document.getElementById('edit-thumb').value;

            if (!title || !content) {
                showToast('タイトルと本文は必須です');
                return;
            }

            const today = new Date().toISOString().split('T')[0];

            if (id) {
                const article = data.articles.find(a => a.id === parseInt(id));
                if (article) {
                    article.title = title;
                    article.author = author;
                    article.category = category;
                    article.level = level;
                    article.levelLabel = levelLabels[level];
                    article.excerpt = excerpt;
                    article.content = content;
                    article.thumb = thumb;
                    article.thumbImage = currentThumbImage || '';
                    showToast('記事を更新しました！');
                }
            } else {
                data.articles.unshift({
                    id: nextId(),
                    title, author, category, level,
                    levelLabel: levelLabels[level],
                    excerpt, content, thumb,
                    thumbImage: currentThumbImage || '',
                    date: today,
                    views: 0,
                    ratings: []
                });
                showToast('記事を投稿しました！');
            }

            saveData(data);
            closeEditor();
            renderStats();
            renderTable();
        }

        function editArticle(id) {
            const article = data.articles.find(a => a.id === id);
            if (article) openEditor(article);
        }

        function deleteArticle(id) {
            if (!confirm('この記事を削除しますか？')) return;
            data.articles = data.articles.filter(a => a.id !== id);
            saveData(data);
            renderStats();
            renderTable();
            showToast('記事を削除しました');
        }

        // ===== Q&A MANAGEMENT =====
        let qaFilter = 'all';

        function renderQAStats() {
            const questions = data.questions || [];
            const total = questions.length;
            const pending = questions.filter(q => q.status === 'pending').length;
            const published = questions.filter(q => q.status === 'published').length;

            document.getElementById('qa-stats').innerHTML = `
                <div class="stat-card">
                    <div class="stat-card-label">総質問数</div>
                    <div class="stat-card-value yellow">${total}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-card-label">未回答</div>
                    <div class="stat-card-value pink">${pending}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-card-label">公開済み</div>
                    <div class="stat-card-value teal">${published}</div>
                </div>
            `;
        }

        function renderQAList() {
            const questions = data.questions || [];
            const filtered = qaFilter === 'all' ? questions : questions.filter(q => q.status === qaFilter);
            const container = document.getElementById('qa-admin-list');

            if (!filtered.length) {
                container.innerHTML = `
                    <div class="table-container">
                        <div class="table-empty">
                            <img src="images/piyo-character.png" alt="Piyo">
                            <p>${qaFilter === 'pending' ? '未回答の質問はありません' : qaFilter === 'published' ? '公開済みの質問はありません' : 'まだ質問がありません'}</p>
                        </div>
                    </div>
                `;
                return;
            }

            container.innerHTML = filtered.map(q => `
                <div class="qa-admin-card">
                    <div class="qa-admin-header">
                        <div class="qa-admin-q">
                            <h4>${escapeHTML(q.question)}</h4>
                            <div class="qa-meta">
                                <span>${escapeHTML(q.name)} さん</span>
                                <span>${q.date}</span>
                            </div>
                        </div>
                        <span class="qa-status-badge ${q.status}">${q.status === 'published' ? '公開済み' : '未回答'}</span>
                    </div>
                    <div class="qa-admin-body">
                        <div class="form-group">
                            <label>回答（HTMLタグ使用可）</label>
                            <textarea id="qa-answer-${q.id}" placeholder="回答を入力してください...">${q.answer || ''}</textarea>
                            <div class="qa-admin-hint">HTMLタグが使用できます（&lt;p&gt;、&lt;code&gt;、&lt;strong&gt;など）</div>
                        </div>
                        <div class="qa-admin-actions">
                            <button class="btn btn-primary btn-sm" onclick="saveQAAnswer(${q.id})">
                                ${q.status === 'published' ? '回答を更新' : '回答して公開'}
                            </button>
                            ${q.status === 'published' ? `<button class="btn btn-outline btn-sm" onclick="unpublishQA(${q.id})">非公開にする</button>` : ''}
                            <button class="btn btn-danger btn-sm" onclick="deleteQA(${q.id})">削除</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function escapeHTML(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function saveQAAnswer(id) {
            const textarea = document.getElementById('qa-answer-' + id);
            const answer = textarea.value.trim();
            if (!answer) {
                showToast('回答を入力してください');
                return;
            }

            const q = (data.questions || []).find(q => q.id === id);
            if (q) {
                q.answer = answer;
                q.status = 'published';
                saveData(data);
                renderQAStats();
                renderQAList();
                showToast('回答を公開しました！');
            }
        }

        function unpublishQA(id) {
            const q = (data.questions || []).find(q => q.id === id);
            if (q) {
                q.status = 'pending';
                saveData(data);
                renderQAStats();
                renderQAList();
                showToast('非公開にしました');
            }
        }

        function deleteQA(id) {
            if (!confirm('この質問を削除しますか？')) return;
            data.questions = (data.questions || []).filter(q => q.id !== id);
            saveData(data);
            renderQAStats();
            renderQAList();
            showToast('質問を削除しました');
        }

        // Q&A tab buttons
        document.querySelectorAll('.qa-tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.qa-tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                qaFilter = btn.dataset.filter;
                renderQAList();
            });
        });

        // ===== EVENTS =====
        document.getElementById('btn-new-article').addEventListener('click', () => openEditor());

        // 再ビルドボタン
        document.getElementById('btn-rebuild').addEventListener('click', async () => {
            const hookUrl = localStorage.getItem('piyo_deploy_hook');
            if (!hookUrl) {
                const url = prompt('Vercel Deploy Hook の URL を入力してください\n（Vercelダッシュボード → Settings → Git → Deploy Hooks で作成）\n※ 一度だけ。次回からは自動で使われます。');
                if (!url) return;
                localStorage.setItem('piyo_deploy_hook', url);
            }
            const url = localStorage.getItem('piyo_deploy_hook');
            const status = document.getElementById('rebuild-status');
            const btn = document.getElementById('btn-rebuild');
            btn.disabled = true;
            status.style.display = 'block';
            status.style.background = '#fef3c7';
            status.style.color = '#92400e';
            status.textContent = '🔄 再ビルドをVercelに依頼中...';
            try {
                const res = await fetch(url, { method: 'POST' });
                if (!res.ok) throw new Error('HTTP ' + res.status);
                status.style.background = '#d1fae5';
                status.style.color = '#065f46';
                status.innerHTML = '✅ 再ビルドを開始しました。1〜2分後に <a href="https://piyoai.b-steep.com/" target="_blank">本番サイト</a> に反映されます。';
            } catch (e) {
                status.style.background = '#fee2e2';
                status.style.color = '#991b1b';
                status.textContent = '❌ エラー: ' + e.message + '（Hook URLを確認してください）';
                localStorage.removeItem('piyo_deploy_hook');
            } finally {
                btn.disabled = false;
            }
        });
        document.getElementById('btn-save').addEventListener('click', saveArticle);
        document.getElementById('btn-cancel').addEventListener('click', closeEditor);

        // ===== AUTHORS STATS =====
        const authorColors = ['#5BA89D','#D4A017','#E07B8B','#6C5CE7','#00B894','#E17055','#0984E3','#A29BFE'];

        function getAuthorColor(name) {
            let hash = 0;
            for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
            return authorColors[Math.abs(hash) % authorColors.length];
        }

        function renderAuthorsPage() {
            const articles = data.articles || [];
            const authorMap = {};

            articles.forEach(a => {
                const name = a.author || '（未設定）';
                if (!authorMap[name]) authorMap[name] = { articles: 0, views: 0, ratings: [] };
                authorMap[name].articles++;
                authorMap[name].views += (a.views || 0);
                authorMap[name].ratings.push(...(a.ratings || []));
            });

            const authors = Object.entries(authorMap).map(([name, s]) => ({
                name,
                articles: s.articles,
                views: s.views,
                avgRating: s.ratings.length ? (s.ratings.reduce((a,b) => a+b, 0) / s.ratings.length).toFixed(1) : '-',
                totalRatings: s.ratings.length
            })).sort((a, b) => b.views - a.views);

            const totalAuthors = authors.filter(a => a.name !== '（未設定）').length;
            const maxViews = Math.max(...authors.map(a => a.views), 1);

            document.getElementById('authors-stats-cards').innerHTML = `
                <div class="stat-card">
                    <div class="stat-card-label">執筆者数</div>
                    <div class="stat-card-value yellow">${totalAuthors}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-card-label">総記事数</div>
                    <div class="stat-card-value teal">${articles.length}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-card-label">総閲覧数</div>
                    <div class="stat-card-value pink">${articles.reduce((s,a) => s + (a.views||0), 0).toLocaleString()}</div>
                </div>
            `;

            const tbody = document.getElementById('authors-table-body');

            if (!authors.length) {
                tbody.innerHTML = `
                    <div class="table-empty">
                        <img src="images/piyo-character.png" alt="Piyo">
                        <p>まだ記事がありません</p>
                    </div>`;
                return;
            }

            tbody.innerHTML = `
                <table>
                    <thead>
                        <tr>
                            <th>執筆者</th>
                            <th>記事数</th>
                            <th>総閲覧数</th>
                            <th>閲覧割合</th>
                            <th>平均評価</th>
                            <th>評価数</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${authors.map(a => {
                            const color = getAuthorColor(a.name);
                            const initial = a.name.charAt(0);
                            const barPct = (a.views / maxViews * 100).toFixed(0);
                            return `<tr>
                                <td>
                                    <div class="author-name-cell">
                                        <div class="author-avatar" style="background:${color}">${initial}</div>
                                        <strong>${a.name}</strong>
                                    </div>
                                </td>
                                <td>${a.articles}</td>
                                <td>${a.views.toLocaleString()}</td>
                                <td>
                                    <div class="author-bar">
                                        <div class="author-bar-fill" style="width:${barPct}%;background:${color}"></div>
                                    </div>
                                </td>
                                <td>★ ${a.avgRating}</td>
                                <td>${a.totalRatings}</td>
                            </tr>`;
                        }).join('')}
                    </tbody>
                </table>`;
        }

        // ===== PAGE NAVIGATION =====
        function showPage(page) {
            document.getElementById('page-dashboard').style.display = 'none';
            document.getElementById('page-qa').classList.remove('active');
            document.getElementById('page-authors').classList.remove('active');

            if (page === 'qa') {
                document.getElementById('page-qa').classList.add('active');
                renderQAStats();
                renderQAList();
            } else if (page === 'authors') {
                document.getElementById('page-authors').classList.add('active');
                renderAuthorsPage();
            } else {
                document.getElementById('page-dashboard').style.display = 'block';
                if (page === 'new') openEditor();
                else if (page === 'articles') closeEditor();
            }
        }

        document.querySelectorAll('.sidebar-nav a').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                document.querySelectorAll('.sidebar-nav a').forEach(l => l.classList.remove('active'));
                link.classList.add('active');
                showPage(link.dataset.page);
            });
        });

        // ===== INIT =====
        renderStats();
        renderTable();
    </script>
</body>
</html>
